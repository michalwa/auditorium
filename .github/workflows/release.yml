name: Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Package JAR file
        run: mvn -B package
      - uses: softprops/action-gh-release@v2
        with:
          files: target/auditorium-*-jar-with-dependencies.jar
