name: Check version

on: push

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Check version
        run: test "v$(mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout)" == "v0.1.0"
